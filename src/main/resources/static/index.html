<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f5f7fb;
            font-family: "Inter", sans-serif;
            color: #1e293b;
        }

        .container-box{
            max-width: 1100px;
            margin: 60px auto;
            background: white;
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        .topbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title{
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle{
            color: #64748b;
            font-size: 14px;
            margin-top: 3px;
        }

        .btn-add{
            background: #111827;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 500;
        }

        .btn-add:hover{
            background: #000;
        }

        .search-box{
            margin-bottom: 25px;
        }

        .search-input{
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #dbe2ea;
        }

        .table{
            margin: 0;
        }

        .table thead{
            background: #111827;
            color: white;
        }

        .table thead th{
            border: none;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
        }

        .table tbody td{
            padding: 18px 16px;
            vertical-align: middle;
            border-color: #eef2f7;
        }

        .table tbody tr:hover{
            background: #f8fafc;
        }

        .student{
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar{
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #111827;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .student-name{
            font-weight: 600;
        }

        .student-id{
            color: #64748b;
            font-size: 13px;
        }

        .email{
            color: #475569;
        }

        .btn-action{
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 14px;
        }

        .modal-content{
            border: none;
            border-radius: 18px;
        }

        .modal-header{
            border: none;
            padding: 22px 24px 10px;
        }

        .modal-body{
            padding: 10px 24px 24px;
        }

        .form-control{
            border-radius: 10px;
            padding: 12px;
        }

        .save-btn{
            background: #111827;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
        }

        .save-btn:hover{
            background: black;
        }

    </style>
</head>

<body>

<div class="container-box">

    <!-- TOPBAR -->
    <div class="topbar">

        <div>
            <div class="title">
                Student Management
            </div>

            
        </div>

        <button class="btn-add"
                data-bs-toggle="modal"
                data-bs-target="#studentModal"
                onclick="prepareAdd()">

            + Add Student

        </button>

    </div>

    <!-- SEARCH -->
    <div class="search-box">

        <input type="text"
               class="form-control search-input"
               id="searchInput"
               placeholder="Search student..."
               oninput="searchStudent()">

    </div>

    <!-- TABLE -->
    <div class="table-responsive">

        <table class="table align-middle"
               id="studentTable">

            <thead>
            <tr>
                <th>Student</th>
                <th>Email</th>
                <th width="160" class="text-center">
                    Actions
                </th>
            </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="studentModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 id="modalTitle">
                    Add Student
                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <form id="studentForm">

                    <div id="divIdField"
                         style="display:none">

                        <input type="number"
                               id="s_id"
                               class="form-control mb-3"
                               disabled>

                    </div>

                    <div class="mb-3">

                        <input type="text"
                               id="s_name"
                               class="form-control"
                               placeholder="Student name"
                               required>

                    </div>

                    <div class="mb-4">

                        <input type="email"
                               id="s_email"
                               class="form-control"
                               placeholder="Student email"
                               required>

                    </div>

                    <button class="save-btn">

                        Save Student

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

    const apiBase = "/api/students";
    let isEditMode = false;

    /* LOAD */
    async function loadStudents(){

        const res = await fetch(apiBase);
        const data = await res.json();

        renderTable(data);
    }

    /* SEARCH */
    async function searchStudent(){

        const keyword =
            document.getElementById("searchInput")
            .value.trim();

        if(keyword === ""){
            loadStudents();
            return;
        }

        const res = await fetch(
            `${apiBase}/search?keyword=${encodeURIComponent(keyword)}`
        );

        const data = await res.json();

        renderTable(data);
    }

    /* DELETE */
    async function deleteStudent(id){

        if(!confirm("Delete this student?"))
            return;

        await fetch(
            `${apiBase}/delete/${id}`,
            { method:"POST" }
        );

        loadStudents();
    }

    /* SUBMIT */
    document.getElementById("studentForm").onsubmit = async (e)=>{

        e.preventDefault();

        const id =
            document.getElementById("s_id").value;

        const student = {

            name:
                document.getElementById("s_name").value,

            email:
                document.getElementById("s_email").value
        };

        let url = apiBase;

        if(isEditMode){

            url = `${apiBase}/update/${id}`;
            student.id = id;
        }

        await fetch(url,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify(student)
        });

        bootstrap.Modal.getInstance(
            document.getElementById("studentModal")
        ).hide();

        loadStudents();
    };

    /* RENDER */
    function renderTable(students){

        const tbody =
            document.querySelector("#studentTable tbody");

        if(!students || students.length === 0){

            tbody.innerHTML = `
                <tr>
                    <td colspan="3"
                        class="text-center p-5 text-muted">

                        No students found

                    </td>
                </tr>
            `;

            return;
        }

        tbody.innerHTML = students.map(s => `

            <tr>

                <td>

                    <div class="student">

                        <div class="avatar">

                            ${s.name.charAt(0).toUpperCase()}

                        </div>

                        <div>

                            <div class="student-name">

                                ${s.name}

                            </div>

                            <div class="student-id">

                                ID #${s.id}

                            </div>

                        </div>

                    </div>

                </td>

                <td>

                    <div class="email">

                        ${s.email}

                    </div>

                </td>

                <td class="text-center">

                    <button class="btn btn-warning btn-sm btn-action"
                            onclick="prepareEdit(
                                ${s.id},
                                '${s.name}',
                                '${s.email}'
                            )">

                        Edit

                    </button>

                    <button class="btn btn-danger btn-sm btn-action"
                            onclick="deleteStudent(${s.id})">

                        Delete

                    </button>

                </td>

            </tr>

        `).join("");
    }

    /* ADD */
    function prepareAdd(){

        isEditMode = false;

        document.getElementById("studentForm").reset();

        document.getElementById("divIdField")
            .style.display = "none";

        document.getElementById("modalTitle")
            .innerText = "Add Student";
    }

    /* EDIT */
    function prepareEdit(id,name,email){

        isEditMode = true;

        document.getElementById("divIdField")
            .style.display = "block";

        document.getElementById("s_id").value = id;

        document.getElementById("s_name").value = name;

        document.getElementById("s_email").value = email;

        document.getElementById("modalTitle")
            .innerText = "Edit Student";

        new bootstrap.Modal(
            document.getElementById("studentModal")
        ).show();
    }

    window.onload = loadStudents;

</script>

</body>
</html>
