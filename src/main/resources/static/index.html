<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Sinh Viên</title>

    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f8f9fa);
            font-family: "Segoe UI", sans-serif;
        }

        .container {
            max-width: 1100px;
        }

        .card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        h2 {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .form-control {
            border-radius: 12px;
        }

        .btn {
            border-radius: 12px;
        }

        .table thead {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            text-transform: uppercase;
            font-size: 14px;
        }

        .table tbody tr:hover {
            background: #f1f5ff;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="card p-4">
        <h2 class="text-center text-primary mb-4">
            <i class="fas fa-user-graduate"></i> QUẢN LÝ SINH VIÊN
        </h2>

        <!-- SEARCH + ADD -->
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text"
                           id="searchInput"
                           class="form-control"
                           placeholder="Nhập tên sinh viên..."
                           oninput="searchStudent()">
                    <button class="btn btn-outline-primary" onclick="searchStudent()">
                        <i class="fas fa-search"></i> Tìm kiếm
                    </button>
                </div>
            </div>

            <div class="col-md-6 text-end">
                <button class="btn btn-success"
                        data-bs-toggle="modal"
                        data-bs-target="#studentModal"
                        onclick="prepareAdd()">
                    <i class="fas fa-plus-circle"></i> Thêm sinh viên mới
                </button>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="studentTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Họ và Tên</th>
                    <th>Email</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="studentModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">Thông tin sinh viên</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="studentForm">
                    <div class="mb-3" id="divIdField" style="display:none">
                        <label>ID</label>
                        <input type="number" id="s_id" class="form-control" disabled>
                    </div>

                    <div class="mb-3">
                        <label>Họ tên</label>
                        <input type="text" id="s_name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="s_email" class="form-control" required>
                    </div>

                    <button class="btn btn-primary w-100" type="submit">
                        Lưu dữ liệu
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const apiBase = "/api/students";
    let isEditMode = false;

    /* LOAD LIST */
    async function loadStudents() {
        const res = await fetch(apiBase);
        const data = await res.json();
        renderTable(data);
    }

    /* SEARCH - FIXED */
    async function searchStudent() {
        const keyword = document.getElementById("searchInput").value.trim();

        // Không nhập gì -> load lại toàn bộ
        if (keyword === "") {
            loadStudents();
            return;
        }

        const res = await fetch(
            `${apiBase}/search?keyword=${encodeURIComponent(keyword)}`
        );
        const data = await res.json();
        renderTable(data);
    }

    /* DELETE */
    async function deleteStudent(id) {
        if (!confirm("Xóa sinh viên ID " + id + "?")) return;
        await fetch(`${apiBase}/delete/${id}`, { method: "POST" });
        loadStudents();
    }

    /* SUBMIT FORM */
    document.getElementById("studentForm").onsubmit = async (e) => {
        e.preventDefault();

        const id = document.getElementById("s_id").value;
        const student = {
            name: document.getElementById("s_name").value,
            email: document.getElementById("s_email").value
        };

        let url = apiBase;
        if (isEditMode) {
            url = `${apiBase}/update/${id}`;
            student.id = id;
        }

        await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(student)
        });

        bootstrap.Modal.getInstance(
            document.getElementById("studentModal")
        ).hide();

        loadStudents();
    };

    /* RENDER TABLE */
    function renderTable(students) {
        const tbody = document.querySelector("#studentTable tbody");

        if (!students || students.length === 0) {
            tbody.innerHTML =
                `<tr><td colspan="4" class="text-center">Không có dữ liệu</td></tr>`;
            return;
        }

        tbody.innerHTML = students.map(s => `
            <tr>
                <td>#${s.id}</td>
                <td>${s.name}</td>
                <td>${s.email}</td>
                <td class="text-center">
                    <button class="btn btn-warning btn-sm"
                            onclick="prepareEdit(${s.id}, '${s.name}', '${s.email}')">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-danger btn-sm"
                            onclick="deleteStudent(${s.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `).join("");
    }

    function prepareAdd() {
        isEditMode = false;
        document.getElementById("studentForm").reset();
        document.getElementById("divIdField").style.display = "none";
        document.getElementById("modalTitle").innerText = "Thêm sinh viên mới";
    }

    function prepareEdit(id, name, email) {
        isEditMode = true;
        document.getElementById("divIdField").style.display = "block";
        document.getElementById("s_id").value = id;
        document.getElementById("s_name").value = name;
        document.getElementById("s_email").value = email;
        document.getElementById("modalTitle").innerText = "Chỉnh sửa sinh viên";
        new bootstrap.Modal(document.getElementById("studentModal")).show();
    }

    window.onload = loadStudents;
</script>

</body>
</html>
